{{ template "header.html" . }}

<div class="nb-card">
    <h1 class="nb-heading">登录</h1>
    <p class="nb-subheading">请输入您的凭据</p>

    <form method="post" action="{{ .PostURL }}">
        {{ if .Invalid }}
        <div class="nb-error">
            无效 {{ .UsernamePrompt }} 或密码。
        </div>
        {{ end }}

        <div class="nb-form-group">
            <label class="nb-label" for="login">{{ .UsernamePrompt }}</label>
            <input
                type="text"
                id="login"
                name="login"
                class="nb-input"
                placeholder="请输入您的邮箱地址"
                {{ if .Username }}value="{{ .Username }}"{{ else }}autofocus{{ end }}
                required
            >
        </div>

        <div class="nb-form-group">
            <label class="nb-label" for="password">密码</label>
            <input
                type="password"
                id="password"
                name="password"
                class="nb-input"
                placeholder="请输入您的密码"
                {{ if .Invalid }}autofocus{{ end }}
                required
            >
        </div>

        <button type="submit" id="submit-login" class="nb-btn">
            登录
        </button>
    </form>

    {{ if .BackLink }}
    <div class="nb-back-link">
        <a href="{{ .BackLink }}" class="nb-link">选择另一种登录方法</a>
    </div>
    {{ end }}
</div>

<script>
document.querySelector('form').onsubmit = function() {
    document.getElementById('submit-login').disabled = true;
};
</script>

{{ template "footer.html" . }}
