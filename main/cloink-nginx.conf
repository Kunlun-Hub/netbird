# Cloink Nginx Configuration
# Based on main/nginx-netbird.conf, with Cloink log and relay routes made explicit.
#
# 1. Update server_name and SSL certificate paths below.
# 2. Copy to your nginx config directory:
#    Debian/Ubuntu: /etc/nginx/sites-available/cloink (then symlink to sites-enabled)
#    RHEL/CentOS:   /etc/nginx/conf.d/cloink.conf
# 3. Test and reload: nginx -t && systemctl reload nginx

upstream cloink_dashboard {
    server 127.0.0.1:8080;
    keepalive 10;
}

upstream cloink_server {
    server 127.0.0.1:8081;
    keepalive 32;
}

server {
    listen 80;
    server_name lhp-uat.ztoky.cn;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name lhp-uat.ztoky.cn;

    # SSL/TLS Configuration
    # Let's Encrypt (certbot):
    #   ssl_certificate /etc/letsencrypt/live/lhp-uat.ztoky.cn/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/lhp-uat.ztoky.cn/privkey.pem;
    #
    # Let's Encrypt (acme.sh):
    #   ssl_certificate /root/.acme.sh/lhp-uat.ztoky.cn/fullchain.cer;
    #   ssl_certificate_key /root/.acme.sh/lhp-uat.ztoky.cn/lhp-uat.ztoky.cn.key;
    #
    # Custom certificates:
    #   ssl_certificate /etc/ssl/certs/lhp-uat.ztoky.cn.crt;
    #   ssl_certificate_key /etc/ssl/private/lhp-uat.ztoky.cn.key;
    ssl_certificate /path/to/your/fullchain.pem;
    ssl_certificate_key /path/to/your/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Required for long-lived gRPC/WebSocket connections.
    client_header_timeout 1d;
    client_body_timeout 1d;
    proxy_read_timeout 1d;
    proxy_send_timeout 1d;
    grpc_read_timeout 1d;
    grpc_send_timeout 1d;
    client_max_body_size 128m;

    # Common proxy headers.
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Scheme $scheme;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;

    grpc_set_header X-Real-IP $remote_addr;
    grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    grpc_set_header X-Forwarded-Proto https;
    grpc_set_header X-Forwarded-Host $host;

    # Relay and WebSocket proxy used by clients for relay/signal/management streams.
    location ~ ^/(relay(?:/|$)|ws-proxy/) {
        proxy_pass http://cloink_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }

    # Native gRPC services:
    # - signalexchange.SignalExchange: peer signal exchange
    # - management.ManagementService: client management sync
    # - flow.FlowService: client network/DNS flow log upload
    location ~ ^/(signalexchange\.SignalExchange|management\.ManagementService|flow\.FlowService)/ {
        grpc_pass grpc://cloink_server;
        grpc_socket_keepalive on;
        grpc_read_timeout 1d;
        grpc_send_timeout 1d;
    }

    # Dashboard log APIs. These are also covered by /api, but are listed
    # explicitly so deployments do not miss Cloink's audit/proxy/network logs.
    location ~ ^/api/events/(audit|proxy|network-traffic)(/summary)?$ {
        proxy_pass http://cloink_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Management API and OAuth2 routes.
    location ~ ^/(api|oauth2)/ {
        proxy_pass http://cloink_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Dashboard.
    location / {
        proxy_pass http://cloink_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
