    <rect class="chip" x="514" y="120" width="160" height="48"/>
    <text class="chipText" x="530" y="151">VPN Certificates</text>
    <rect class="chip" x="696" y="120" width="104" height="48"/>
    <text class="chipText" x="714" y="151">IP ranges</text>

