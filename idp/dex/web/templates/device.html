{{ template "header.html" . }}

<div class="nb-card">
    <h1 class="nb-heading">设备登录</h1>
    <p class="nb-subheading">请输入您的设备显示的代码</p>

    <form method="post" action="{{ .PostURL }}">
        {{ if .Invalid }}
        <div class="nb-error">
            无效的用户代码。
        </div>
        {{ end }}

        <div class="nb-form-group">
            <label class="nb-label" for="user_code">设备代码</label>
            <input
                type="text"
                id="user_code"
                name="user_code"
                class="nb-input"
                placeholder="XXXX-XXXX"
                {{ if .UserCode }}value="{{ .UserCode }}"{{ end }}
                required
                autofocus
            >
        </div>

        <button type="submit" class="nb-btn">
            继续
        </button>
    </form>
</div>

{{ template "footer.html" . }}
