    <text class="text" text-anchor="middle" x="0" y="70">Marta</text>
    <text class="muted" text-anchor="middle" x="0" y="92">Account Manager</text>
  </g>

  <rect class="panel" x="1010" y="120" width="320" height="180"/>
  <line class="divider" x1="1170" y1="140" x2="1170" y2="280"/>
  <g transform="translate(1090 178)">
    <path class="orange" d="M-20 0 0-11 20 0 0 11z M-20 13 0 24 20 13 M-20 26 0 37 20 26"/>
    <text class="text" text-anchor="middle" x="0" y="72">Web Server</text>
  </g>
  <g transform="translate(1250 176)">
    <ellipse class="orange" cx="0" cy="0" rx="17" ry="8"/>
    <path class="orange" d="M-17 0v39c0 4 8 8 17 8s17-4 17-8V0 M-17 14c0 4 8 8 17 8s17-4 17-8 M-17 28c0 4 8 8 17 8s17-4 17-8"/>
    <text class="text" text-anchor="middle" x="0" y="74">Database</text>
  </g>

  <rect class="panel" x="1010" y="558" width="320" height="180"/>
  <line class="divider" x1="1170" y1="578" x2="1170" y2="718"/>
  <g transform="translate(1090 617)">
    <rect class="orange" x="-18" y="-18" width="36" height="36" rx="3"/>
    <path class="orange" d="M-10 -9h20 M-10 -1h20"/>
    <text class="text" text-anchor="middle" x="0" y="68">CRM</text>
  </g>
  <g transform="translate(1250 616)">
    <path class="orange" d="M-20 0 0-11 20 0 0 11z M-20 13 0 24 20 13 M-20 26 0 37 20 26"/>
    <text class="text" text-anchor="middle" x="0" y="69">Web Server</text>
  </g>

  <path class="line" d="M288 210 H442"/>
  <path class="line" d="M870 210 H1010"/>
  <path class="line" d="M288 646 H436"/>
  <path class="line" d="M870 646 H1010"/>

  <path class="thin" d="M1170 300 V342"/>
  <path class="thin" d="M1170 438 V558"/>
  <path class="line" d="M1170 300 V338"/>
  <path class="line" d="M1170 514 V554"/>
  <path class="thin" d="M1108 410 H1232"/>
  <path class="thin" d="M1170 386 V450"/>

  <g>
