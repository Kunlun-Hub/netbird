  <rect class="soft greenBox" x="584" y="660" width="300" height="60"/>
  <text class="boxTitle" x="663" y="688">Store / Migration / Jobs</text>
  <text class="small" x="641" y="707">/var/lib/netbird、活动日志、任务队列</text>

