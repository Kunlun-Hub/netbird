  <text class="boxText" x="650" y="835">其他 NetBird Peers</text>
  <text class="boxText" x="840" y="835">config.yaml / volume / version_releases/files</text>
  <text class="boxText" x="1168" y="835">WireGuard 加密业务流量</text>

