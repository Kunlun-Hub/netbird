  <rect class="soft greenBox" x="752" y="474" width="132" height="58"/>
  <text class="boxText" x="782" y="501">Posture</text>
  <text class="small" x="786" y="518">设备姿态检查</text>
  <rect class="soft greenBox" x="584" y="558" width="132" height="58"/>
  <text class="boxText" x="607" y="585">Setup Keys</text>
  <text class="small" x="607" y="602">批量注册凭据</text>
  <rect class="soft greenBox" x="752" y="558" width="132" height="58"/>
  <text class="boxText" x="770" y="585">Version Releases</text>
