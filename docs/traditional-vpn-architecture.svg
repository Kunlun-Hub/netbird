    <text class="chipText" x="459" y="215">Firewall</text>
    <rect class="chip" x="560" y="184" width="66" height="48"/>
    <text class="chipText" x="577" y="215">NAT</text>
    <rect class="chip" x="648" y="184" width="66" height="48"/>
    <text class="chipText" x="664" y="215">DNS</text>
    <rect class="chip" x="738" y="184" width="140" height="48"/>
    <text class="chipText" x="756" y="215">VPN Gateway</text>
    <rect class="chip" x="472" y="250" width="78" height="48"/>
    <text class="chipText" x="491" y="281">SAML</text>
    <rect class="chip" x="574" y="250" width="86" height="48"/>
    <text class="chipText" x="592" y="281">Routes</text>
    <rect class="chip" x="682" y="250" width="162" height="48"/>
    <text class="chipText" x="700" y="281">Security Groups</text>
  </g>

  <g>
    <rect class="chip" x="466" y="560" width="78" height="48"/>
    <text class="chipText" x="485" y="591">SAML</text>
    <rect class="chip" x="568" y="560" width="86" height="48"/>
    <text class="chipText" x="586" y="591">Routes</text>
    <rect class="chip" x="680" y="560" width="162" height="48"/>
