<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">传统远程访问架构图</title>
  <desc id="desc">展示传统 VPN 架构中办公室、家庭、云环境、数据中心以及中间复杂网络配置之间的关系。</desc>
  <defs>
    <radialGradient id="warmGlow" cx="50%" cy="50%" r="68%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="52%" stop-color="#060707"/>
      <stop offset="100%" stop-color="#1b0f09"/>
    </radialGradient>
    <filter id="orangeGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#ff8a3d" flood-opacity="0.65"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#a7b1c2" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6f7887"/>
    </marker>
    <style>
      .bg { fill: url(#warmGlow); }
      .label { font: 700 23px Arial, "Noto Sans CJK SC", sans-serif; fill: #efe7de; }
      .title { font: 700 26px Arial, "Noto Sans CJK SC", sans-serif; fill: #f4eee8; }
      .sub { font: 400 14px Arial, "Noto Sans CJK SC", sans-serif; fill: #9ca5b2; }
      .text { font: 700 18px Arial, "Noto Sans CJK SC", sans-serif; fill: #f3f4f6; }
      .muted { font: 400 13px Arial, "Noto Sans CJK SC", sans-serif; fill: #aab1bd; }
      .chipText { font: 700 17px Arial, "Noto Sans CJK SC", sans-serif; fill: #e9edf3; }
      .panel { fill: #030404; stroke: #de793c; stroke-width: 1.4; rx: 6; filter: url(#orangeGlow); }
      .chip { fill: #090a0d; stroke: #6f7887; stroke-width: 1.3; rx: 5; filter: url(#softGlow); }
      .line { fill: none; stroke: #6f7887; stroke-width: 1.8; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #596270; stroke-width: 1.4; }
      .orange { fill: none; stroke: #ff8a3d; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .pin { fill: #ff8a3d; }
      .divider { stroke: #9c5b36; stroke-width: 1.2; }
      .complex { stroke: #6f7887; stroke-width: 1.2; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="820"/>
  <text class="title" x="502" y="48">传统 VPN / 专线式远程访问架构</text>
  <text class="sub" x="514" y="76">每个入口、环境和应用都需要重复维护证书、网段、网关、路由、防火墙、DNS 与身份集成</text>

  <g transform="translate(110 83)">
    <path class="pin" d="M9 0c-5 0-9 4-9 9 0 7 9 17 9 17s9-10 9-17c0-5-4-9-9-9zm0 12.2a3.6 3.6 0 1 1 0-7.2 3.6 3.6 0 0 1 0 7.2z"/>
    <text class="label" x="26" y="20">OFFICE</text>
  </g>
  <g transform="translate(110 706)">
    <path class="pin" d="M9 0c-5 0-9 4-9 9 0 7 9 17 9 17s9-10 9-17c0-5-4-9-9-9zm0 12.2a3.6 3.6 0 1 1 0-7.2 3.6 3.6 0 0 1 0 7.2z"/>
    <text class="label" x="26" y="20">HOME</text>
  </g>
  <g transform="translate(1124 83)">
    <path class="pin" d="M9 0c-5 0-9 4-9 9 0 7 9 17 9 17s9-10 9-17c0-5-4-9-9-9zm0 12.2a3.6 3.6 0 1 1 0-7.2 3.6 3.6 0 0 1 0 7.2z"/>
    <text class="label" x="26" y="20">CLOUD</text>
  </g>
  <g transform="translate(1095 706)">
    <path class="pin" d="M9 0c-5 0-9 4-9 9 0 7 9 17 9 17s9-10 9-17c0-5-4-9-9-9zm0 12.2a3.6 3.6 0 1 1 0-7.2 3.6 3.6 0 0 1 0 7.2z"/>
    <text class="label" x="26" y="20">DATACENTER</text>
  </g>

  <rect class="panel" x="62" y="120" width="226" height="180"/>
  <g transform="translate(177 174)">
    <circle class="orange" cx="0" cy="0" r="9"/>
    <path class="orange" d="M-20 45c1-25 39-25 40 0"/>
    <text class="text" text-anchor="middle" x="0" y="70">John</text>
    <text class="muted" text-anchor="middle" x="0" y="92">Software Engineer</text>
  </g>

  <rect class="panel" x="62" y="558" width="226" height="180"/>
  <g transform="translate(177 612)">
