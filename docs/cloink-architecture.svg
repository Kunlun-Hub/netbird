<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Cloink / NetBird 项目架构图</title>
  <desc id="desc">展示 Dashboard、Management、Signal、Relay、STUN、Client Agent、外部依赖与持久化之间的主要关系。</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 28px Arial, "Noto Sans CJK SC", sans-serif; fill: #1d2530; }
      .subtitle { font: 400 15px Arial, "Noto Sans CJK SC", sans-serif; fill: #5e6b7a; }
      .laneTitle { font: 700 18px Arial, "Noto Sans CJK SC", sans-serif; fill: #253142; }
      .boxTitle { font: 700 15px Arial, "Noto Sans CJK SC", sans-serif; fill: #273245; }
      .boxText { font: 400 13px Arial, "Noto Sans CJK SC", sans-serif; fill: #48566a; }
      .small { font: 400 12px Arial, "Noto Sans CJK SC", sans-serif; fill: #657386; }
      .pill { font: 700 12px Arial, "Noto Sans CJK SC", sans-serif; fill: #31415a; }
      .lane { stroke-width: 2; rx: 12; }
      .box { fill: #ffffff; stroke-width: 1.4; rx: 8; }
      .soft { fill: #ffffffcc; stroke-width: 1.2; rx: 7; }
      .blueLane { fill: #eaf1ff; stroke: #77a1ee; }
      .greenLane { fill: #eaf8ef; stroke: #6fba86; }
      .purpleLane { fill: #f2ecff; stroke: #a98cf2; }
      .grayLane { fill: #eef1f4; stroke: #aeb8c4; }
      .blueBox { stroke: #5c88df; }
      .greenBox { stroke: #58a970; }
      .purpleBox { stroke: #9574dc; }
      .grayBox { stroke: #9da8b5; }
      .arrow { fill: none; stroke: #59697c; stroke-width: 2; marker-end: url(#arrow); }
      .arrowBlue { fill: none; stroke: #477bd2; stroke-width: 2; marker-end: url(#arrowBlue); }
      .arrowGreen { fill: none; stroke: #39935c; stroke-width: 2; marker-end: url(#arrowGreen); }
      .arrowDash { fill: none; stroke: #7b8795; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#59697c"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#477bd2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#39935c"/>
    </marker>
  </defs>

  <rect class="bg" width="1440" height="900"/>
  <text class="title" x="54" y="56">Cloink / NetBird 项目架构图</text>
  <text class="subtitle" x="54" y="84">基于当前代码结构：dashboard、netbird/management、netbird/client、signal、relay、stun 与 docker-compose 自托管部署</text>

  <rect class="lane grayLane" x="38" y="120" width="170" height="650"/>
  <text class="laneTitle" x="72" y="166">访问入口</text>
