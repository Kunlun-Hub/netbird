  <text class="boxText" x="82" y="255">浏览器访问</text>
  <rect class="box grayBox" x="62" y="324" width="122" height="70"/>
  <text class="boxTitle" x="82" y="353">终端用户</text>
  <text class="boxText" x="78" y="375">Agent / CLI</text>
